<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>calced</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  color-scheme: light dark;
  --bg: #fff;
  --surface: #f8f8f8;
  --border: #ddd;
  --text: #222;
  --dim: #767676;
  --result: #166534;
  --header-bg: #f0f0f0;
  --accent: #2563eb;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1e1e2e;
    --surface: #181825;
    --border: #313244;
    --text: #cdd6f4;
    --dim: #9399b2;
    --result: #a6e3a1;
    --header-bg: #11111b;
    --accent: #89b4fa;
  }
}
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: monospace; }
body { display: flex; flex-direction: column; width: fit-content; min-width: min(720px, 100%); max-width: 100%; margin: 0 auto; }
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 20px; background: var(--header-bg); border-bottom: 1px solid var(--border);
}
header h1 { font-size: 1em; font-weight: 600; color: var(--dim); }
header div { display: flex; gap: 8px; }
#new-btn, #share-btn {
  background: var(--border); color: var(--text); border: none; padding: 6px 14px;
  border-radius: 4px; cursor: pointer; font: inherit; font-size: 0.85em;
}
#new-btn:hover, #share-btn:hover { background: var(--accent); color: var(--header-bg); }
#share-btn.copied { background: var(--result); color: var(--header-bg); }
.editor-wrap {
  flex: 1; overflow-y: auto;
}
.editor-inner {
  display: flex; min-height: 100%;
}
.input-wrap {
  flex: 1 1 0; min-width: 0; min-height: 100%;
  display: grid; background: var(--surface);
}
.input-wrap > * {
  grid-area: 1/1; padding: 12px 16px; font: inherit; line-height: 1.7;
  white-space: pre-wrap; tab-size: 4; overflow-wrap: break-word; word-break: break-all;
}
#highlight { pointer-events: none; color: var(--text); }
.hl-line { min-height: 1lh; }
#input {
  field-sizing: content; color: transparent; caret-color: var(--text);
  background: transparent; border: none; resize: none;
  outline: none; overflow: hidden;
}
.hl-dim { color: var(--dim); }
.hl-comment { font-weight: bold; }
#input::placeholder { color: var(--dim); }
#results {
  width: 200px; min-width: 120px; background: var(--surface);
  border-left: 1px solid var(--border); padding: 12px 16px;
  overflow: hidden; user-select: none;
}
.result-line {
  line-height: 1.7; text-align: right;
  color: var(--result); white-space: nowrap; overflow: hidden;
}
</style>
</head>

<header>
  <h1>calced</h1>
  <div>

<div class="editor-wrap">

      <div id="highlight" aria-hidden="true"></div>
      <textarea id="input" spellcheck="false" placeholder="rent 1500&#10;groceries 200 + 150&#10;utilities 80 + 45&#10;total"></textarea>
    </div>

</div>
<!-- BEGIN CALCED ENGINE -->
<script>
// --- SI Prefixes ---
const SI_PREFIX = {
  "Q":1e30,"R":1e27,"Y":1e24,"Z":1e21,"E":1e18,"P":1e15,"T":1e12,
  "G":1e9,"M":1e6,"K":1e3,"k":1e3,"m":1e-3,"u":1e-6,"\u03bc":1e-6,
  "n":1e-9,"p":1e-12,"f":1e-15,"a":1e-18,"z":1e-21,"y":1e-24
};
const SI_SUFFIX_CHARS = Object.keys(SI_PREFIX).join("").replace(/[-[\]{}()*+?.,\\^$|#\s]/g, '\\$&');
const NUM_RE = new RegExp("^(\\d(?:\\d|_|,(?=\\d))*\\.?\\d*|\\.\\d+)(?:([eE][+-]?\\d+)|([" + SI_SUFFIX_CHARS + "]))?");
const HEX_BIN_OCT_RE = /^0[xX][0-9a-fA-F]+|^0[bB][01]+|^0[oO][0-7]+/;

const BUILTIN_FUNCS_1 = {
  sqrt: Math.sqrt, abs: Math.abs, floor: Math.floor, ceil: Math.ceil,
  log: Math.log, log2: Math.log2, log10: Math.log10,
  sin: Math.sin, cos: Math.cos, tan: Math.tan,
  asin: Math.asin, acos: Math.acos, atan: Math.atan,
  exp: Math.exp,
};
const BUILTIN_FUNCS_N = {
  round: (args) => args.length === 1 ? Math.round(args[0]) : parseFloat(args[0].toFixed(args[1])),
  min: (args) => Math.min(...args),
  max: (args) => Math.max(...args),
};
const BUILTIN_FUNC_NAMES = new Set([...Object.keys(BUILTIN_FUNCS_1), ...Object.keys(BUILTIN_FUNCS_N)]);
const BUILTIN_CONSTS = { pi: Math.PI, e: Math.E, tau: 2 * Math.PI };

// --- Unit conversion tables ---
const UNIT_TABLE = {
  length: {
    mm:0.001,millimeter:0.001,millimeters:0.001,
    cm:0.01,centimeter:0.01,centimeters:0.01,
    m:1,meter:1,meters:1,
    km:1000,kilometer:1000,kilometers:1000,
    "in":0.0254,inch:0.0254,inches:0.0254,
    ft:0.3048,foot:0.3048,feet:0.3048,
    yd:0.9144,yard:0.9144,yards:0.9144,
    mi:1609.344,mile:1609.344,miles:1609.344,
  },
  mass: {
    mg:0.001,milligram:0.001,milligrams:0.001,
    g:1,gram:1,grams:1,
    kg:1000,kilogram:1000,kilograms:1000,
    oz:28.3495,ounce:28.3495,ounces:28.3495,
    lb:453.592,lbs:453.592,pound:453.592,pounds:453.592,
  },
  temperature: {
    c:"c",celsius:"c",
    f:"f",fahrenheit:"f",
    k:"k",kelvin:"k",
  },
  data: {
    b:1,byte:1,bytes:1,
    kb:1000,kilobyte:1000,kilobytes:1000,
    mb:1e6,megabyte:1e6,megabytes:1e6,
    gb:1e9,gigabyte:1e9,gigabytes:1e9,
    tb:1e12,terabyte:1e12,terabytes:1e12,
    kib:1024,kibibyte:1024,kibibytes:1024,
    mib:1048576,mebibyte:1048576,mebibytes:1048576,
    gib:1073741824,gibibyte:1073741824,gibibytes:1073741824,
    tib:1099511627776,tebibyte:1099511627776,tebibytes:1099511627776,
  },
  time: {
    ms:0.001,millisecond:0.001,milliseconds:0.001,
    s:1,sec:1,second:1,seconds:1,
    min:60,minute:60,minutes:60,
    hr:3600,hour:3600,hours:3600,
    day:86400,days:86400,
    week:604800,weeks:604800,
  },
  volume: {
    ml:1,milliliter:1,milliliters:1,
    l:1000,liter:1000,liters:1000,
    tsp:4.929,teaspoon:4.929,teaspoons:4.929,
    tbsp:14.787,tablespoon:14.787,tablespoons:14.787,
    floz:29.574,cup:236.588,cups:236.588,
    pt:473.176,pint:473.176,pints:473.176,
    qt:946.353,quart:946.353,quarts:946.353,
    gal:3785.41,gallon:3785.41,gallons:3785.41,
  },
};

const UNIT_LOOKUP = Object.create(null);
for (const [dim, units] of Object.entries(UNIT_TABLE)) {
  for (const [name, factor] of Object.entries(units)) {
    UNIT_LOOKUP[name] = [dim, factor];
  }
}

function convertTemperature(value, fromKey, toKey) {
  let k;
  if (fromKey === "c") k = value + 273.15;
  else if (fromKey === "f") k = (value - 32) * 5 / 9 + 273.15;
  else k = value;
  if (toKey === "c") return k - 273.15;
  if (toKey === "f") return (k - 273.15) * 9 / 5 + 32;
  return k;
}

function tokenize(text) {
  const tokens = [];
  let i = 0;
  const n = text.length;
  while (i < n) {
    if (text[i] === ' ' || text[i] === '\t') { i++; continue; }
    const start = i;
    const slice = text.substring(i);
    // Hex/binary/octal
    if (text[i] === "0" && i + 1 < n && "xXbBoO".includes(text[i + 1])) {
      const hm = slice.match(HEX_BIN_OCT_RE);
      if (hm) {
        const val = Number(hm[0]);
        const end = i + hm[0].length;
        tokens.push(["NUM", val, start, end]);
        i = end;
        continue;
      }
    }
    const m = slice.match(NUM_RE);
    if (m && m[1]) {
      const raw = m[1].replace(/,/g, "").replace(/_/g, "");
      const exp = m[2];
      let val = exp ? parseFloat(raw + exp) : parseFloat(raw);
      const suffix = m[3];
      if (suffix) val *= SI_PREFIX[suffix];
      const end = i + m[0].length;
      if (end < n && text[end] === "%") {
        tokens.push(["PCT", val, start, end + 1]);
        i = end + 1;
      } else {
        tokens.push(["NUM", val, start, end]);
        i = end;
      }
      continue;
    }
    if (text[i] === "+" || text[i] === "-") { tokens.push(["ADDOP", text[i], start, i+1]); i++; continue; }
    if (text[i] === "*" || text[i] === "/") { tokens.push(["MULOP", text[i], start, i+1]); i++; continue; }
    if (text[i] === "^") { tokens.push(["POW", "^", start, i+1]); i++; continue; }
    if (text[i] === "%") { tokens.push(["MULOP", "%", start, i+1]); i++; continue; }
    if (text[i] === "(") { tokens.push(["LPAREN", "(", start, i+1]); i++; continue; }
    if (text[i] === ")") { tokens.push(["RPAREN", ")", start, i+1]); i++; continue; }
    if (text[i] === ",") { tokens.push(["COMMA", ",", start, i+1]); i++; continue; }
    if (text[i] === "=") { tokens.push(["EQ", "=", start, i+1]); i++; continue; }
    const wm = slice.match(/^[a-zA-Z_]\w*/);
    if (wm) {
      const word = wm[0];
      const wl = word.toLowerCase();
      const end = i + wm[0].length;
      if (wl === "of") tokens.push(["OF", "of", start, end]);
      else if (wl === "total" || wl === "sum") tokens.push(["TOTAL", wl, start, end]);
      else if (BUILTIN_FUNC_NAMES.has(wl)) tokens.push(["FUNC", wl, start, end]);
      else tokens.push(["WORD", word, start, end]);
      i = end;
      continue;
    }
    i++;
  }
  tokens.push(["EOF", null, n, n]);
  return tokens;
}

class Parser {
  constructor(tokens) { this.tokens = tokens; this.pos = 0; }
  peek() { return this.pos < this.tokens.length ? this.tokens[this.pos] : ["EOF", null]; }
  consume() { return this.tokens[this.pos++]; }
  parseExpr() {
    let left = this.parseTerm();
    while (this.peek()[0] === "ADDOP") {
      const op = this.consume()[1];
      if (this.peek()[0] === "PCT") {
        const pct = this.consume()[1];
        left = op === "+" ? left * (1 + pct / 100) : left * (1 - pct / 100);
      } else {
        const right = this.parseTerm();
        left = op === "+" ? left + right : left - right;
      }
    }
    return left;
  }
  parseTerm() {
    let left = this.parsePower();
    while (this.peek()[0] === "MULOP") {
      const op = this.consume()[1];
      const right = this.parsePower();
      if (op === "*") left *= right;
      else if (op === "/") { if (right === 0) throw new Error("division by zero"); left /= right; }
      else if (op === "%") { if (right === 0) throw new Error("division by zero"); left %= right; }
    }
    return left;
  }
  parsePower() {
    let base = this.parseUnary();
    if (this.peek()[0] === "POW") { this.consume(); const exp = this.parseUnary(); return Math.pow(base, exp); }
    return base;
  }
  parseUnary() {
    if (this.peek()[0] === "ADDOP") {
      const op = this.consume()[1];
      const val = this.parsePrimary();
      return op === "-" ? -val : val;
    }
    return this.parsePrimary();
  }
  parsePrimary() {
    const t = this.peek();
    if (t[0] === "NUM") { this.consume(); return t[1]; }
    if (t[0] === "PCT") {
      this.consume();
      const pct = t[1];
      if (this.peek()[0] === "OF") { this.consume(); const base = this.parseExpr(); return pct / 100 * base; }
      return pct / 100;
    }
    if (t[0] === "FUNC") {
      const name = this.consume()[1];
      if (this.peek()[0] !== "LPAREN") throw new Error("Expected ( after " + name);
      this.consume();
      const args = [this.parseExpr()];
      while (this.peek()[0] === "COMMA") { this.consume(); args.push(this.parseExpr()); }
      if (this.peek()[0] !== "RPAREN") throw new Error("Missing )");
      this.consume();
      if (name in BUILTIN_FUNCS_1) {
        if (args.length !== 1) throw new Error(name + " takes 1 argument");
        return BUILTIN_FUNCS_1[name](args[0]);
      }
      if (name in BUILTIN_FUNCS_N) return BUILTIN_FUNCS_N[name](args);
      throw new Error("Unknown function: " + name);
    }
    if (t[0] === "LPAREN") {
      this.consume();
      const val = this.parseExpr();
      if (this.peek()[0] !== "RPAREN") throw new Error("Missing )");
      this.consume();
      return val;
    }
    throw new Error("Unexpected: " + t[0]);
  }
}

function evaluateLine(text, variables) {
  let tokens = tokenize(text);
  if (tokens.some(t => t[0] === "TOTAL")) return ["TOTAL", variables];
  const allVars = Object.create(null);
  for (const k in BUILTIN_CONSTS) allVars[k] = BUILTIN_CONSTS[k];
  for (const k in variables) allVars[k] = variables[k];
  const hasValue = tokens.some(t =>
    t[0] === "NUM" || t[0] === "PCT" || t[0] === "FUNC" || (t[0] === "WORD" && t[1].toLowerCase() in allVars)
  );
  if (!hasValue) return [null, variables];
  let pos = 0;
  let varName = null;
  if (tokens.length >= 3 && tokens[0][0] === "WORD" && tokens[1][0] === "EQ") {
    varName = tokens[0][1].toLowerCase();
    pos = 2;
  }
  // Detect unit conversion suffix: ... <from_unit> in|to <to_unit> EOF
  let conversion = null;
  const eofIdx = tokens.length - 1;
  if (eofIdx >= 4) {
    const tTo = tokens[eofIdx - 1];
    const tKw = tokens[eofIdx - 2];
    const tFr = tokens[eofIdx - 3];
    if ((tTo[0] === "WORD" || tTo[0] === "FUNC")
        && tKw[0] === "WORD" && (tKw[1].toLowerCase() === "in" || tKw[1].toLowerCase() === "to")
        && (tFr[0] === "WORD" || tFr[0] === "FUNC")) {
      const frName = tFr[1].toLowerCase();
      const toName = tTo[1].toLowerCase();
      if (frName in UNIT_LOOKUP && toName in UNIT_LOOKUP) {
        const [frDim, frFactor] = UNIT_LOOKUP[frName];
        const [toDim, toFactor] = UNIT_LOOKUP[toName];
        if (frDim === toDim) {
          conversion = [frDim, frFactor, toFactor];
          tokens = [...tokens.slice(0, eofIdx - 3), tokens[eofIdx]];
        }
      }
    }
  }
  const mathTokens = [];
  for (let j = pos; j < tokens.length; j++) {
    const t = tokens[j];
    if (t[0] === "WORD") {
      const wl = t[1].toLowerCase();
      if (wl in allVars) mathTokens.push(["NUM", allVars[wl]]);
    } else if (t[0] === "EQ") {
      // skip
    } else {
      mathTokens.push(t);
    }
  }
  try {
    const parser = new Parser(mathTokens);
    let result = parser.parseExpr();
    if (parser.peek()[0] !== "EOF") return [null, variables];
    if (conversion !== null) {
      const [dim, fromFactor, toFactor] = conversion;
      if (dim === "temperature") {
        result = convertTemperature(result, fromFactor, toFactor);
      } else {
        result = result * fromFactor / toFactor;
      }
    }
    if (varName) {
      const newVars = Object.create(null);
      for (const k in variables) newVars[k] = variables[k];
      newVars[varName] = result;
      return [result, newVars];
    }
    return [result, variables];
  } catch (e) {
    return [null, variables];
  }
}

function addCommas(s) {
  const parts = s.split(".");
  parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ",");
  return parts.join(".");
}

function formatResult(n, fmtOpts) {
  if (!fmtOpts) fmtOpts = { mode: "minSig", precision: 3, separator: "underscore" };
  const mode = fmtOpts.mode;
  const prec = fmtOpts.precision;
  const sep = fmtOpts.separator;
  function applySep(s) {
    if (sep === "comma") return s;
    if (sep === "underscore") return s.replace(/,/g, "_");
    if (sep === "space") return s.replace(/,/g, " ");
    return s.replace(/,/g, "");
  }
  if (mode === "minSig") {
    if (n === 0) return applySep("0");
    const showDec = Math.max(-Math.floor(Math.log10(Math.abs(n)) + 1) + prec, 0);
    const rounded = parseFloat(n.toFixed(showDec));
    let s;
    if (showDec === 0) {
      s = addCommas(Math.round(rounded).toString());
    } else {
      s = addCommas(rounded.toFixed(showDec));
      s = s.replace(/0+$/, "").replace(/\.$/, "");
    }
    return applySep(s);
  }
  if (mode === "fixed") {
    return applySep(addCommas(n.toFixed(prec)));
  }
  if (mode === "scientific") {
    const decPlaces = Math.max(prec - 1, 0);
    // Pad exponent to 2 digits to match Python's format
    return n.toExponential(decPlaces).replace(/e([+-])(\d)$/, "e$1" + "0$2");
  }
  if (mode === "auto") {
    return n.toPrecision(prec);
  }
  return String(n);
}

const DIRECTIVE_RE = /^@(format|separator)\s*=\s*(.+)$/i;
const FORMAT_RE = /^(minSig|fixed|scientific|auto)(?:\((\d+)\))?$/i;

function classifyLine(text, variables) {
  const stripped = text.trim();
  if (!stripped) return "blank";
  if (stripped.startsWith("#")) return "comment";
  if (DIRECTIVE_RE.test(stripped)) return "directive";

  const tokens = tokenize(text);
  const allNames = new Set();
  for (const k in BUILTIN_CONSTS) allNames.add(k);
  if (variables) { for (const k in variables) allNames.add(k); }

  const hasMath = tokens.some(t =>
    t[0] !== "EOF" && (
      t[0] === "NUM" || t[0] === "PCT" || t[0] === "FUNC" || t[0] === "TOTAL"
      || (t[0] === "WORD" && allNames.has(t[1].toLowerCase()))
    )
  );

  // Determine which token indices are "active" (part of math)
  const active = new Set();

  if (hasMath) {
    // TOTAL lines: only the TOTAL token is active
    if (tokens.some(t => t[0] === "TOTAL")) {
      for (let i = 0; i < tokens.length; i++) {
        if (tokens[i][0] === "TOTAL") active.add(i);
      }
    } else {
      // Assignment: WORD = ...
      let mathStart = 0;
      if (tokens.length >= 3 && tokens[0][0] === "WORD" && tokens[1][0] === "EQ") {
        active.add(0);
        active.add(1);
        mathStart = 2;
      }

      // Unit conversion suffix
      const eofIdx = tokens.length - 1;
      let convStart = eofIdx;
      if (eofIdx >= 4) {
        const tTo = tokens[eofIdx - 1];
        const tKw = tokens[eofIdx - 2];
        const tFr = tokens[eofIdx - 3];
        if ((tTo[0] === "WORD" || tTo[0] === "FUNC")
            && tKw[0] === "WORD" && (tKw[1].toLowerCase() === "in" || tKw[1].toLowerCase() === "to")
            && (tFr[0] === "WORD" || tFr[0] === "FUNC")) {
          const frName = tFr[1].toLowerCase();
          const toName = tTo[1].toLowerCase();
          if (frName in UNIT_LOOKUP && toName in UNIT_LOOKUP
              && UNIT_LOOKUP[frName][0] === UNIT_LOOKUP[toName][0]) {
            active.add(eofIdx - 3);
            active.add(eofIdx - 2);
            active.add(eofIdx - 1);
            convStart = eofIdx - 3;
          }
        }
      }

      // Build math tokens (mirrors evaluateLine), track original indices
      const allVars = Object.create(null);
      for (const k in BUILTIN_CONSTS) allVars[k] = BUILTIN_CONSTS[k];
      if (variables) { for (const k in variables) allVars[k] = variables[k]; }
      const mathTokens = [];
      const mathToOrig = [];
      for (let idx = mathStart; idx < tokens.length; idx++) {
        const t = tokens[idx];
        if (idx >= convStart && idx < eofIdx) continue;
        if (t[0] === "WORD") {
          const wl = t[1].toLowerCase();
          if (wl in allVars) {
            mathTokens.push(["NUM", allVars[wl], t[2], t[3]]);
            mathToOrig.push(idx);
          }
        } else if (t[0] === "EQ") {
          // skip
        } else {
          mathTokens.push(t);
          mathToOrig.push(idx);
        }
      }

      // Parse and mark consumed tokens as active
      let fullSuccess = false;
      try {
        const parser = new Parser(mathTokens);
        parser.parseExpr();
        fullSuccess = parser.peek()[0] === "EOF";
      } catch (e) {
        // parse failed
      }
      if (fullSuccess) {
        for (const origIdx of mathToOrig) active.add(origIdx);
      } else {
        // Only value tokens (NUM, PCT) are active
        for (let i = 0; i < mathToOrig.length; i++) {
          if (mathTokens[i][0] === "NUM" || mathTokens[i][0] === "PCT") {
            active.add(mathToOrig[i]);
          }
        }
      }
    }
  }

  // Build spans: gaps always dimmed, tokens dimmed unless active
  const spans = [];
  let pos = 0;
  for (let i = 0; i < tokens.length; i++) {
    const t = tokens[i];
    if (t[0] === "EOF") break;
    const start = t[2], end = t[3];
    if (start > pos) spans.push([pos, start, true]);
    spans.push([start, end, !active.has(i)]);
    pos = end;
  }
  if (pos < text.length) spans.push([pos, text.length, true]);
  return spans;
}

function escapeHTML(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function highlightLine(text, cls) {
  if (cls === "blank") return "";
  if (cls === "comment") return '<span class="hl-comment">' + escapeHTML(text) + '</span>';
  if (cls === "directive") return '<span class="hl-dim">' + escapeHTML(text) + '</span>';
  let html = "";
  for (const [start, end, dim] of cls) {
    const chunk = escapeHTML(text.substring(start, end));
    html += dim ? '<span class="hl-dim">' + chunk + '</span>' : chunk;
  }
  return html;
}

function processText(text) {
  const lines = text.split("\n");
  let variables = Object.create(null);
  let resultsAcc = [];
  let fmtOpts = { mode: "minSig", precision: 3, separator: "underscore" };
  const output = [];
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    const stripped = line.trim();
    const cls = classifyLine(line, variables);
    const dm = stripped.match(DIRECTIVE_RE);
    if (dm) {
      const key = dm[1].toLowerCase();
      const val = dm[2].trim();
      if (key === "format") {
        const fm = val.match(FORMAT_RE);
        if (fm) {
          const modeRaw = fm[1].toLowerCase();
          const modeMap = { minsig: "minSig", fixed: "fixed", scientific: "scientific", auto: "auto" };
          fmtOpts.mode = modeMap[modeRaw] || modeRaw;
          fmtOpts.precision = fm[2] !== undefined ? parseInt(fm[2]) : 3;
        }
      } else if (key === "separator") {
        const v = val.toLowerCase();
        if (["off","underscore","comma","space"].includes(v)) fmtOpts.separator = v;
      }
      output.push({ result: null, cls });
      continue;
    }
    if (stripped.startsWith("#")) {
      resultsAcc = [];
      output.push({ result: null, cls });
      continue;
    }
    if (!stripped) {
      resultsAcc.push(null);
      output.push({ result: null, cls });
      continue;
    }
    const [result, newVars] = evaluateLine(stripped, variables);
    variables = newVars;
    if (result === "TOTAL") {
      const total = resultsAcc.reduce((s, r) => s + (r !== null ? r : 0), 0);
      resultsAcc.push(total);
      output.push({ result: formatResult(total, { ...fmtOpts }), cls });
    } else if (result !== null) {
      resultsAcc.push(result);
      output.push({ result: formatResult(result, { ...fmtOpts }), cls });
    } else {
      resultsAcc.push(null);
      output.push({ result: null, cls });
    }
  }
  return output;
}
// END CALCED ENGINE
</script>

<script>
// --- UI Wiring ---
const input = document.getElementById("input");
const results = document.getElementById("results");
const highlight = document.getElementById("highlight");
const shareBtn = document.getElementById("share-btn");

function render() {
  const text = input.value;
  const lines = text.split("\n");
  const output = processText(text);
  results.innerHTML = output.map(o =>
    '<div class="result-line">' + (o.result !== null ? escapeHTML(o.result) : '') + '</div>'
  ).join("");
  highlight.innerHTML = output.map((o, i) =>
    '<div class="hl-line">' + highlightLine(lines[i], o.cls) + '</div>'
  ).join("");
  // Sync result line heights with highlight line heights
  const hlLines = highlight.children;
  const resLines = results.children;
  for (let i = 0; i < hlLines.length && i < resLines.length; i++) {
    resLines[i].style.height = hlLines[i].offsetHeight + 'px';
  }
  scheduleHashUpdate();
}

input.addEventListener("input", render);

// --- URL Hash Encoding ---
let hashTimer = null;
function scheduleHashUpdate() {
  clearTimeout(hashTimer);
  hashTimer = setTimeout(() => updateHash(), 300);
}

async function compressText(text) {
  if (typeof CompressionStream === "undefined") {
    return "b64." + btoa(unescape(encodeURIComponent(text)));
  }
  const stream = new Blob([text]).stream().pipeThrough(new CompressionStream("deflate-raw"));
  const buf = await new Response(stream).arrayBuffer();
  const bytes = new Uint8Array(buf);
  let binary = "";
  for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
  return btoa(binary).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
}

async function decompressText(hash) {
  if (hash.startsWith("b64.")) {
    return decodeURIComponent(escape(atob(hash.slice(4))));
  }
  const binary = atob(hash.replace(/-/g, "+").replace(/_/g, "/"));
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  if (typeof DecompressionStream === "undefined") {
    return decodeURIComponent(escape(atob(hash)));
  }
  const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream("deflate-raw"));
  return await new Response(stream).text();
}

async function updateHash() {
  const text = input.value;
  if (!text) { history.replaceState(null, "", location.pathname); return; }
  const encoded = await compressText(text);
  history.replaceState(null, "", "#" + encoded);
}

async function loadFromHash() {
  const hash = location.hash.slice(1);
  if (!hash) return;
  try {
    input.value = await decompressText(hash);
    render();
  } catch (e) {
    console.error("Failed to decode URL hash:", e);
  }
}

function shareURL() {
  navigator.clipboard.writeText(location.href).then(() => {
    shareBtn.textContent = "Link copied!";
    shareBtn.classList.add("copied");
    setTimeout(() => { shareBtn.textContent = "Share"; shareBtn.classList.remove("copied"); }, 1500);
  });
}

loadFromHash();
</script>
</body>
